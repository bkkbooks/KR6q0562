body:
  text: 嗣法門人寂方智霈海汧超系等編住湖州武康翔鳳山顯忠崇孝資福禪寺語録升座師自崇禎甲申春誅茅翔鳳至順治甲午冬衆求結制海鹽徐君載護法夫人行修請升座僧問豁開戶牖妙手難描當軒者誰抬眸錯過師以棒擉開云到即不點進云秪如強項不回頭者和尚如何施設師云且居門外進云門內底又作麼生師云自招款案問大制從來無結解因何平地起風波師云早知恁麼已是遲進云天上天下惟吾獨尊去也師便打云轉見郎當問翔鳳峰前呈瑞色鉢盂山上播祥光佛法大意即不問開罏結制事如何師云好向風頭看火色進云謝師指示師云也須眼底辨金鋀問翔鳳峰頭作舞十方海會雲臻就中一句應時及節請師宣師云秪要腳踏實自然眼豁開進云為憐三歲子不惜兩行眉師云識得山僧也未進云吞納大千門不二堂堂廓落露全機師便打乃豎拂子云此便是當年鷲嶺微笑一著子恁麼見得則黃面老子金色頭陀一肩擔荷徹體無多直得正法眼人人今古彌亙涅槃心箇箇歷劫不磨掃卻從前間露布那來迷悟涉淆訛忽有箇傍不甘底出來道是則是今日剋期立限也是平地干戈驀與他一棒云無繩索縛英靈漢汝又將身入網羅鹽官張行修居士同室沈氏壽誕請升座師云抱膝鳳山下常年口懶開那堪輕漏泄今日又重來諸兄弟來也來了説無可説何故千説萬説原是一説千聞萬聞秪是一聞若也見得則昨日説今日説説説自超越昨日聞今日聞聞聞絶比倫方信本來一著子迥超天地獨為尊忽有箇衲僧出來道者漢前言不顧後語好與三十棒但向他道汝擔得好板棒我也甘喫爭奈武原人未肯點頭在乃揮拂子云但願春風吹不老瞎驢笑得口門開師誕自慶禪人請升座師云釋迦不出世達摩不西來佛法遍天下談玄口不開諸兄弟向者裏會得還有佛祖立地處也無還容觀上座説青道黃也無殊不知未生面目箇箇全彰覿體風光人人具足回觀三藏十二部是甚熱碗鳴聲一千七百則是甚狗咬枯骨正眼看來無夢説夢無事生事正好朝打三千暮打八百忽有箇漢聞與麼道憤性出來道資福你者般饒舌已是好肉剜瘡欺陷平人資福終不壓良為賤拄杖子兩手分付何故舉揚恁麼事須是恁麼人幸有恁麼人方諳恁麼事其或不然未免死水裏藏龍欲搆宗門向上事何啻萬里望潼關雖然如是今晨自禪人製法衣為我慶壽諸兄弟殷勤強我舉揚且道説箇甚麼即得若説有生有死卻是病目見空花若説無死無生又是怖頭走他國去此二途如何端的阿呵呵當初只謂茅長短燒了元來地不平結制升座師云未過楊墳渡撒手便回決無今日事既過渡來結住布袋口縱有韜略卒無用處且如何是今日事諸人還知麼若也知得畫地為牢終非究竟無繩自縛豈自甘休直須活潑潑如俊鶻沖霄赤灑灑似錦鱗破浪苟或未然勸諸人莫廉纖安排不是佛扭捏亦非禪千杯不醉風流子吸盡西江不費錢師誕日雲間苕霅衆居士請升座問答不録師云昨日者箇時節全無消息卻有巴鼻今日者箇時節雖無巴鼻卻有消息若向昨日會去爭見今朝消息若向今日會去難辨昨日巴鼻説是語時叵耐翔鳳峰忍俊不禁牽拽鉢盂案開口大笑直得天落山與大遮山睜眉怒目一齊震動嚇得瞎驢隊裏跳出許多泥牛白牯倣徨四顧未得翻身山僧見其恐怖生心連忙捺出老婆心懸挂剎竿上乃向道汝等善生瞻仰此段微妙難信之法乃自心現量境界只要返本還源便踏故鄉田地於是翔鳳峰鉢盂案天落山與大遮山方得歡喜讚歎合掌而作偈言業擊禺山債未休知非己過又從頭耙犁雖不拖泥水耕遍乾坤四海流喝一喝下座師誕日棲水衆居士請升座僧問昔日釋迦離兜率降王宮意旨如何師云南山起雲進云指天指地目顧四方唯我獨尊又作麼生師云與汝通箇消息進云雲門曰我當時若見一棒打殺與狗子喫且道是雪屈是報恩師云丈夫氣宇合如斯進云今日吾師出世還有為人句也無師云重説偈言進云苕水今朝年半百漆園贏得八千椿師云也要大家知問桃花放小春欲結千歲實為復是慶生為復是應時師云分別即不得進云昔日靈雲見便悟如何是悟底意旨師云鼻孔大頭垂進云今朝資福不知幾多人悟去師云惺惺者惺惺懵懂者懵懂進云和盤托出從人薦只要諸人鑑本真師云一任轉量僧禮拜桃含章居士問釋迦降生九龍吐水和尚示誕有何祥瑞師云謝居士齋進云蒙師指出波心月箇裏寒潭徹底清師云要汝自承當乃云資福五十年來不曾咬著一粒米且道噇箇甚麼五十年來不曾挂著一縷絲且道穿箇甚麼於斯明得不惟日消萬兩黃金亦合受四天下供養於斯不明粒米寸絲也當拖犁拽耙償他始得大衆因甚如此得人一牛還人一馬下座大殿上梁升座師云闢草開荒全憑衲子扶揚插標建剎猶賴龍天呵護無龍天呵護難繼昔人遺蹤有衲子扶揚方成今日叢席雖然此猶是建立門庭邊事正眼觀來盡大地是寶王剎何興何廢何古何今遍剎塵是淨法身誰增誰減誰聖誰凡既無聖凡增減又無古今興廢則現前大衆若僧若俗若男若女乃至遠近檀護不期自集便合回光返照悟明得去則寶王殿內人人立地有分淨法身中箇箇覿體無二倘或未諳向第二義門更為諸人通箇消息村歌社舞喧天鬧笑看虛空架畫梁卓拄杖下座逸凡上座同雲間衆居士送大鐘入山請升座師云法門有大器乾坤絶覆藏赤身擔荷漢渴力為敷揚敷揚喜有其人秪如大器到來如何與伊證據卓拄杖云向者裏證據得去皇恩佛恩一時報畢檀施法施兩得相酬更説甚麼聞聲悟道方諳箇裏端倪見色明心始信本來是佛然則今日法柄在握畢竟令歸何地復以拄杖向空點云若將耳聽終難會眼裏聞聲方始親逸凡上座領雲間民仲吳居士六旬請升座首座問有物先天地無形本寂寥既是無形又喚甚麼作物師云主山恆突兀進云能為萬象主不逐四時凋目前萬象森然四時代謝作麼生是不凋底意旨師云澗水自長流進云秪如居士誕期敦請説法未審如何慶讚師云合寺人多慶進云恁麼則華亭信有千年鶴今日親從海上來師云共謝飽香齋乃云昨夜翔鳳關與禺泉亭爭論甚鬧一謂佛法貴要乘時宣説一謂佛法不可輕易流布卻被鉢盂案開口大笑山僧忍俊不禁各與三十拄杖試問者三十拄杖還有賞罰也無若有賞罰在甚麼處若無衲僧眼何在民仲吳居士你是雲間伶俐漢聞者般説話便與麼會去不惟罔極之恩今已報盡則本來壽量亦見延長秪如天台頂上行忽逢南海天平僧又作麼生遂揮拂云盡把無生消息露卻來人世樂逍遙塘棲沈君善居士為母十周送法衣請升座止水問生死交謝寒暑迭遷有物流動人之常情只如無陰陽地上如何舉步師云你即今在甚麼處進云秪如沈居士請法薦親且道功歸何所師云腦後著眼看進云與麼則生身父母居堂上從本爺娘在頂門師云何曾離者裏進云一念頓超諸祖意者回方始報親恩師云又要重添注腳問昔日世尊説法天雨四花地搖六震今朝和尚升堂豎拂拈椎現何祥瑞師云腳跟齊點地進云翔鳳峰頭祥霧地鉢盂巖畔瑞雲生師云風光溢目多問人天普集選佛場開為人一句如何舉唱師云一棒一條痕進云萬象森羅咸稽首大千沙界盡沾恩師拈棒云會取棒頭旨僧禮拜師乃云祖師西來初無奇特一念回機便同本得只是不合誤賺老神光斷卻一臂帶纍自家失卻一隻者一隻那一隻東土與西天無處得尋覓阿呵呵若是明眼人終不受渠惑復舉長水問琅琊覺楞嚴經云清淨本然云何忽生山河大地琅琊抗聲云清淨本然云何忽生山河大地長水當下悟去師云據古人恁麼問答且那裏是長水悟底道理若明得長水悟底道理便明得今日𣲧君翁為母十周敦請薦拔山僧功不浪施雖然伶俐漢向者裏悟去山河大地忽生且止要且清淨本然又從甚處得來還委悉麼返本還源諳落處齎衣請法入山來須知一念全彰處覿面慈容笑眼開卓拄杖下座棲鎮衆檀護送藏經到山請升座問答不録師云棲水諸居士請藏入山來山僧無法説合掌笑盈腮何故蓋此山自唐宋迄今數百餘載為江浙最大名藍歷代尊宿存名計住者共三十餘位嗣後年代既爾深遠興廢亦復多番荊蓁蔓草觸目荒涼山僧勉力拮據同衆株守數年以來粗成叢席實自無心有所希求今此法王大寶自然而至豈非法門一大盛事哉雖然此猶是敘述茲山履歷之意表揚此藏際會之緣若據當人一著本來具足須知三藏十二部一切修多羅驀豎拂子云皆從者裏流出諸人若也會得便見今日諸檀護發殊勝心成殊勝事亦皆從者裏流出且道者裏又向甚麼處流出還委悉麼不辭潦倒明宣破只恐剜傷好肉瘡卓拄杖下座棲水邵文孚居士薦親請升座茹檗首座問樹欲靜而風不停子欲養而親不在令人常憶蓼莪篇罔極之恩喻覆載正與麼時酬恩一句作麼生道師云解脫門開喜到來進云古人道今生父母當親近從本爺娘仔細看秪如從本爺娘作麼生看師云覿面團圞絶覆藏進云恁麼則生死涅槃皆是夢嚴慈何處隔纖毫師云知得恁麼方解恁麼乃云雲在嶺頭間水流澗底忙不知何大意終日自掀揚諸兄弟便與麼會還得心境一如也未還得物我雙忘也未若未得心境一如物我雙忘到者裏也須是箇漢方能赤灑無依風流自在不見盤山和尚道心月孤圓光吞萬象光非照境境亦非存光境俱忘復是何物洞山云光境未忘復是何物大慧云白鷺下田千點雪黃鸝上樹一枝花我先天童密師翁云孟八郎漢又恁麼去也從上尊宿直截為人無非發明者箇端倪者箇端倪明了然自亦不知是箇甚麼若有甚麼可知即墮在無為無事人猶患金鎖難行腳高流參尋箇事者般旨意大須審細山僧今日説此無上大法蓋為文孚居士請薦二親用報罔極之恩罔極之恩既報且道他二尊人即今在甚麼處安身立命遂卓拄杖云急著眼莫沉吟自從股落霜刀後遍界分明淨法身便下座居士曾割股療親德水上座領棲水思蓮尼并衆善信送法被請升座僧問猊座高登人天普集少室家風請師吐露師拈拂云分明秪者箇進云此是衲僧尋常見解秪如針劄不入處又如何通信師云又被白雲迷進云學人識得和尚了也且道今日塘棲衆善信齎送法被功歸何所師云功歸何所則且置作麼生是識得山僧底意進云與麼獅子吼時芳草緑象王回顧落花紅師呵呵云切忌重露布撥過那邊立僧禮拜云因師置得師云又要拖帶問密密金針鋒不露綿綿玉線縫偏長到來一衆咸胥慶師意如何為舉揚師云惹得春風動地來進云秪如重重寶蓋自天垂朵朵金蓮從地湧時如何師云上座也須著眼觀僧禮拜云天上人間得自由去也師云猶落路頭在進云意氣不從他處得風光自是本來同師云但願恁麼去問揭開幔天網突出獅子吼百獸盡潛蹤龍象笑開口如何笑開口一句師云照顧腦門裂進云世尊未離兜率已降王宮和尚未出母胎度人已畢正恁麼時坐斷當陽且道度箇甚麼師曰更要覓阿誰進云恁麼則龍得水時添意氣虎逢山勢長威獰師打云猶要棒喫僧喝師云不信道問那邊親證一回卻來者邊行履者邊事即不問那邊事作麼生師云覿面相見了何必又重宣進云向上還有事也無師云有進云如何是向上事師垂拂子云試看者一著僧禮拜云到家更不涉程途去也師呵呵大笑乃云天然妙手出格針鋒繡成古錦金獅現突踞當陽氣象雄諸兄弟似者般容妙猶是描畫邊事尚爾驚群絶勝儼然如活何不返觀當人一著向描畫不及處一覷覷透自家面目方知此事不從人得要知此事不從人得便是玄沙𡎺破指頭回雪峰峰問傋頭陀何不遍參去沙云達摩不來東土二祖不往西天教某甲參阿誰山僧當時見玄沙明此消息不覺豁開笑眼如在萬人叢裏輥出相似所以尋常敢道雲門打釋迦未是好手臨濟掌黃蘗猶欠忤逆須知更有一人越過臨濟雲門之見方堪語話既越過雲門臨濟之見了又要語話箇甚麼是汝諸人還知翔鳳老漢立地處麼自從打落青天後笑看森羅萬象奔卓拄杖喝一喝下座樓水鄒吉人居士為母六秩請升座師云楊墳深口鐵般易過資福門前直路難行那來龍象衆滿座競崢嶸繞圍聽我法我法絶形名白棒當頭指粗拳覿面呈都教箇箇風流脫灑直令人人手眼精明鐵饅頭喫飽齁齁無米飯克滿騰騰是則是忽有箇漢出來問秪如今朝者般受用從何而得但向他道源遠流長棲水緑萬年森鬱鳳山青卓拄杖下座棲水張瑞宇居士同室夏氏五秩請升座問答不録師云幻夢浮生五十春團圞琴瑟共同倫轉頭一念彌今古信荷金剛不壞身山僧已為居士祝壽了也直得三十餘代老古錐騰身踴躍合掌證據云是真語者實語者如語者不誑語者是你諸人還見麼若也見得便見當時澧陽路上賣餅婆子因德山肚餓要點心婆問金剛經中道過去心不可得現在心不可得未來心不可得上座擬點那箇心山無語後到龍潭向紙燈吹滅處豁然大悟且道悟箇甚麼還是悟三心不可得耶悟紙燈吹滅耶伶俐漢向者裏一覷便破不惟穿卻那婆子風流鼻孔亦可與老德山把臂共行若猶未也謾道咽喉遭餅塞眼睛突出始超方喝一喝下座師六旬誕日雲間檇李霅溪衆護法請升座問答不録師云今日春風何處來滿筵龍象盡欣懷山僧不會欣懷意但見諸人笑眼開雖然山僧既不會固是窺覷無門諸人笑眼開且道明甚邊事若有所明因甚山僧不會若無所明笑眼開底又是箇甚麼到者裏描固不成畫亦不就囫圇拋出莫間休咎生鐵面皮既絶攀躋破沙盆子那來歲壽乃呵呵大笑云青山耐盡冷冰心誰道今朝又漏逗解制升座僧問九旬已滿即不問魚龍變化是如何師打云看汝轉身來進云頭角養成忝意氣大千何處不風流師云直須腳踏實地始得僧禮拜云謝師答話師云一句好愁人問春光和暖百花新未降王宮已度人解制今朝即不問當陽慶讚若為陳師云本來清淨體脂粉漫塗糊進云翔鳳山頭呈瑞氣鉢盂案上獻醍醐師云妄想幾多人問嶺上二枝春爛熳瓊樓玉殿發光輝且道是甚麼人境界師打云面目甚分明僧喝師云棒頭開正眼端的始知歸乃云一冬與諸人眉毛廝結今日擬欲開交且道箇甚麼即得若道去則有鉤鉤汝未免按牛頭喫草住則有錐錐汝也是平地上起堆爭如鉤也不施錐也不用一條古路八字打開一任諸人南天台北五臺逗到羅紋結角之際忽地踏斷石梁橋擊碎玻璃盞寒拾豐干非從外見金毛師利覿面相逢方知資福一片老婆心為諸人徹困自是諸人不會所以道聖號凡名盡是虛聲殊相劣形皆為幻色汝欲求之得無纍乎及其厭之又成大患與麼説話仔細看來大似描畫虛空徒勞指注且作麼生是真實為人一句歸家盡是兒孫事祖父從來不出門雲間衆居士請升座止水問昔日嬌尸迦與古佛裝像果感天主即今雲間義友十人請師為衆舉揚當獲何果師云且喜春風動地來進云與麼則昔日古佛今朝和尚也師云你又分身兩處看進云可謂人人開正眼箇箇豁頂門去也師云如何是你正眼進云夾路桃花風雨後馬蹄何處避殘紅師云狼藉不少乃云負沖天氣概必具參尋眼目入作家爐韝須盡妙手鉗鎚鉗鎚未盡末後牢關終隔礙眼目不具陷身虀甕受迷籠驀拈拄杖云然則者箇終朝列列挈挈長年挺挺特特具何眼目入何爐韝若也辨得便可七縱八橫以一莖草作丈六金身瓊樓玉宇掌中觀坐微塵裏轉大法輪大千沙界腳尖上即今鐵饅頭一任橫吞豎咬無米飯不妨端坐受供如或未然雲間路杳翔鳳峰高難弟難兄親到此也須各各動寒毛遂卓拄杖下座住嘉興府石門縣福嚴禪寺語録康熙辛亥歲師受嘉禾石邑衆紳襟諸護法暨本山兩序耆舊請於九月十二日進院至山門師以杖指云此是先師當年開闢之處英賢代起盡出斯門山僧今日到來又且如何舉步飲水知源開眼笑鐵船無底渡崑崙佛殿一言獨稱尊傍觀幾打殺多少不平人含冤而怒説休怒説從今不必動干戈海晏河清唱哩囉伽藍自受靈峰囑千斤擔子挑我今承護念庶事賴和調雖然更有一句子也要互相委悉遂插香云此心無愧赤條條祖師眼眼蒼黃色鼻鼻柏子香雖然無可語箇箇舌頭長咦不是兒孫今看破早將家醜外邊揚據室若論此事山僧不敢苟順人情何故蓋者裏是先師行綱立紀為法存公之處若以本分未徹履踐未當糢糊學者罪犯彌天且道新福嚴以何為人一陌清風穿鼻竅眼開不受自欺瞞當日衆護法請升座問答不録師云佛法自有時節因緣不可覆藏憶自先師辭世山僧以心喪株守翔鳳迄今十載志在鈍钁頭邊鋤雲補衲遂此餘生無奈業力難逃被那隊神通羅漢并諸妙用維摩鉤住鼻端必欲牽拽至語水河畔仔細思量實無計可只得老牛拖重耙從迎恩渡過勸農橋登師堂入師室據師座凡先師所屬疆界一一勉力維持祖父者片田地處處徹底翻覆繼往開來悉憑前數酬恩報德盡在今朝遂顧視左右喝一喝云不是山僧多潦倒大都父業子承當卓拄杖下座護法曹遠思同弟正則子巖為母太夫人八十壽請升座僧問祝一人無盡之壽開十方選佛之場建殊勝緣作奇特事忽有箇無面目漢到來如何相待師豎拂云秪將者箇為證據進云與麼則覿面相呈更無回互去也師云須是恁麼始得進云可謂是處是慈氏無門無善才師云此句是重言問天垂寶蓋地湧金蓮為是法爾如然為是神通妙用師云總不恁麼進云還丹一粒點鐵成金至理一言轉凡成聖今日太夫人壽誕請師至理一言師云千年蟠桃核進云昔日世尊升座文殊白椎云諦觀法王法法王法如是未審意旨如何師云有眼盡皆見進云恁麼則寶劍一揮天地靜雙眸才舉斗牛寒師云脫體任風流進云學人禮拜去也師卓拄杖云不堪與麼僧一喝師云又欠端的問鐘鼓交參龍象雲集滿座風光承誰恩力師云杲日見當空進云恁麼則壽算等空誰比量福同滄海若為倫師云何勞讚歎乃云今日一衆咸集座下擬聽山僧為太夫人説法稱壽且道説箇甚麼即得若説世間法渠自興家立業教子育孫乃至發科發甲為官為貴冰霜凜冽節儉維風可謂巾幗丈夫早已傳頌閭里又烏用山僧彈述其萬一若説出世法渠自皈向先師信荷宗乘將四十載衛護此山垂老不忘非宿願弘深焉能諄切若是所以凡海內衲子知有福嚴叢林者莫不知有曹氏金湯之力如是則太夫人壽如福嚴與天中並垂不朽壽如語水同碧玉深濬無窮直得森羅萬象俱呈瑞彩山河大地遍覆祥雲皆是太夫人本有之物亦是先師光明之幢是你諸人還覺眉毛卓朔麼山僧已自忍俊不禁再為助揚一上遂呈起拄杖云不涉陰陽超物表當堂彌播古今春復以拄杖架肩下座薦亡請升座僧問一念無為俱坐斷森羅影裏現全身此猶是教乘極則邊事如何是衲僧向上鉗錘師云又添一箇癡呆進云生也不道死也不道即今薑氏超蓮面目何在師云拶得盲人眼自開進云了了常知無別物凡名聖號等浮漚師云照顧腳下乃云浪走江湖腳跟下三十未為多穩坐家堂頂門上一錐已是遲若是明眼衲僧直須翻轉面皮方能克紹綱宗擔荷箇事且箇事又如何擔荷揮拂子云信手拈信手舞大坐當軒孰敢睹或示太阿鋒或震塗毒鼓直得歷代老古錐箇箇相看把舌吐作驢作馬掣風顛現神現鬼相觸忤撞頭磕額沒處藏罪犯彌天不可數不可數休莽鹵打破生死關無佛亦無祖生死關既已打破且道已往薑氏即今居何方所遂合掌云頓超上品蓮了脫幽冥苦小參解制何君佐居士同室沈氏請小參一期忉忉怛怛且喜眉毛還在未免因齋慶讚唱箇好春光為諸人助行好春光好春光箇箇娘生面目彰踢翻虀甕沖霄去擺脫鉤錐步大方莫靠壁休倚墻大丈夫兒貴自強若使草鞋不具眼腳頭常被石頭傷石頭傷血染青山路轉長盡道天涯無日到誰知回首是家鄉咄咄咄者呆郎莫漫狂三十年前太古話如今説出不成腔任他不采聽自説也何妨遂噯呀一聲云笑斷老婆腸除夕小參召大衆云一年三百六十日與麼磨裙擦褲虛度時光了也今宵卻值臘月三十夜古人喻為生死到頭最是急切底時節秪如當人腳跟下一著子合作麼生理會山僧雖則無事生事也要大家委悉倘有直下知歸者不妨如龍得水似虎逢山展托當機牙爪施呈本有風光其或未然更為諸人打葛藤去也驀卓拄杖云年去年來春復冬衲僧巴鼻若為通瞿曇有口難宣説摩詰無言謾指蹤歷劫不磨非向背當陽突出絶施功等間脫體能擔荷任運堂堂不借中福嚴退院小參師呈拄杖云盡大地是先師面目全憑者箇為流通遍剎塵是山僧行履了無住著可追攀雖然要見山僧行履須明先師面目既明先師面目且道山僧行履在甚麼處遂起身云多謝勸農橋上雨殷勤送我出松關拽杖便行示衆封鍋示衆觀上座今晚封鍋不為別事秪為諸兄弟擔囊挈鉢不憚身力到資福者裏箇箇業為參禪學道了脫生死然既為此大事急切而來豈可辜負故時就此急切處置一問秪如禪作麼生參道作麼生學生死作麼生了若向者裏著著有出身之路答得一語相契不妨依舊開鍋大家同住若答不得便請撿點行囊各各散去資福無間飯與汝喫虛度光陰打鬨過日蓋緣邇來祖道衰微禪風淡薄主席者多懈怠之士行腳者少正因衲子遂使參禪學道了脫生死一段大事因緣卻成虛設良可痛也故觀上座今晚捋下面皮不避嫌謗逆行此令弗圖門庭繁盛只貴正眼流通乃顧左右云出來道道看一僧云文不加點師云汝者一語在禪上著道上著生死上著僧云和尚撿點看師云情知你未諳落處慣弄虛頭僧無語師復高聲云還有麼良久衆無出師云不意命蹇若是與麼拼身捨命入草求人覓箇同伴也不可得遂打翻香几歸方丈示衆舉世尊於涅槃會上以手摩胸告衆曰汝等善觀吾紫磨金色之身瞻仰取足勿令後悔若謂吾滅度非吾弟子若謂吾不滅度亦非吾弟子時百萬億衆悉皆契悟師云世尊末後賣俏如將魚目當明珠百萬億衆悉皆契悟也是烏龜撞壁且道山僧如是批判意在甚處貪觀天上月失卻手中橈示衆門前犬子吠畢竟有人來且道是什麼人聻衆無對師良久云原是舊相識不用別疑猜示衆舉世尊因長爪梵志索論義預約曰我義若墮當斬首以謝世尊曰汝義以何為宗志曰我以一切不受為宗世尊曰是見受否志拂袖而去行至中途有省乃歎曰我義兩處負墮是見若受負門處粗是見不受負門處細一切人天二乘不知我義墮處惟有世尊諸大菩薩知我義墮回至世尊前曰我義兩處負墮故當斬首以謝世尊曰我法中無如是事汝當回心向道於是同五百徒衆一時投佛出家證阿羅漢師云外道最初拂袖便行卻具衲僧作略可惜中途捩轉面皮又向世尊腳跟下納敗正似靈龜拽尾自取喪身之兆示衆舉世尊因文殊至諸佛集處值諸佛各還本處惟有一女子近於佛坐而入三昧文殊乃白佛云何此女得近佛坐而我不得佛告文殊汝但覺此女今從三昧起汝自問之文殊繞女子三匝鳴指一下乃托至梵天盡其神力而不能出世尊曰假使百千文殊亦出此女子定不得下方過四十二恆河沙國土有罔明菩薩能出此女子定須臾罔明大士從地湧出作禮世尊世尊敕罔明出罔明卻至女子前鳴指一下女子於是從定而出師云當時靈山會上者婆娘亦甚奇怪惜乎文殊不識來機青天白日被他迷惑而下方罔明雖則撥轉關捩未免泥裏傷刺若是山僧總不管他入定出定便與他驀面推倒非惟勦除窠臼要使瞿曇慚惶無地示衆舉孚上座因鼓山赴大王請雪峰門送回至法堂乃曰一隻聖箭直射九重城裏去也孚曰是伊未在峰曰渠是徹底人孚曰若不信待某甲去勘過遂趁至中路便問師兄向甚麼處去山曰九重城裏去孚曰忽遇三軍圍繞時如何山曰他家自有通霄路孚曰恁麼則離宮失殿去也山曰何處不稱尊孚拂袖便回峰問如何孚曰好隻聖箭中路折卻了也遂舉前話峰乃曰奴渠語在孚曰者老凍膿卻有鄉情在師云雪峰稱賞鼓山不必論量只如孚上座恁麼問鼓山恁麼答且道什麼處是他聖箭折處向者裏見得倜儻分明便知孚上座只具殺人刀且無活人劍鼓山雖明出身路未解截波瀾點檢則二俱擔板各見一邊若到山僧門下合喫手中拄杖何故賞罰並行示衆舉香嚴上樹若論此事如人上樹口銜樹枝腳不踏枝手不攀枝樹下忽有人問如何是祖師西來意不對他又違他所問若對他又喪身失命當恁麼時作麼生即得時有虎頭招上座出衆云樹上即不問未上樹時請和尚道香乃呵呵大笑師云嶮似懸崖毒如砒礵才沾唇吻便爾喪身然香嚴老漢固是施機善巧為什麼被虎頭一問只得呵呵大笑還委悉麼絲綸擲在煙波裏只為金鱗釣得歸示衆舉五祖演禪師三佛侍祖於一亭上夜話及歸燈已滅祖於暗中曰各人下一轉語佛鑑曰彩鳳舞丹霄佛眼曰鐵蛇橫古路佛果曰看腳下祖曰滅吾宗者克勤耳師云五祖老漢不妨是箇當路大蟲隨處張牙距爪爭奈三子頭角崢嶸各展風規然就中卻被箇返擲獅子攔腳一咬直至如今未得轉身示衆師云衆兄弟須向本參上親見一番出言吐氣自然如龍得水似虎逢山不須風雷遍地波瀾山僧為諸人發揮去也遂以拄杖旋風打散結制示衆師云寶劍揮空誑謔青天鐵蛇攔路平地賺人更欲曲垂巧喻何異淨眼添沙山僧卻不與麼舉拄杖云秪將者箇當陽直指汝等諸人敢道不見復卓拄杖云圓通大震忽爾喧騰汝等諸人敢道不聞見聞既爾分明者箇元非他物所謂處處真處處真塵塵盡是本來人真實説時聲不見正體堂堂沒卻身既是真實説為甚麼聲不見既是正體堂堂為甚麼沒卻身若向者裏會得未入爐鞴早已翻身未動鉗錘亦自光輝其或未然山僧且歸方丈待汝等來通箇消息
