body:
  text: 嗣法門人超翼重編侍者超震普定同閲雜偈復本充禪師繾綣囊藏發動機喜逢春色送君歸雲山處處隨高踞謾使天花歷亂飛募禪堂瓦豁開虛空大口頂門露出青天看來賣弄家醜不如蓋覆為先化米佛法禪機不道無祗緣篾東肚皮枯等間若有知音者休用頭陀為指呼化油拶透河沙半點無間敲石焰見偏枯看來一段光明處盡在檀那筆底敷復朱同文偈大地看來箇同文同文之外更何論山僧證據無餘説佛祖多將一口吞募鑄大鐘鳳山梵剎重興起晨暮鐘聲尚寂沉幸有雲間多妙手當陽擊扣盡知音募修安和寺下溪灣畔古禪林寺額安和宋至今修葺不因檀護力風規爭見日光新化碗玉骨冰肌絶覆藏此身常見為人忙二時家活隨豐儉一味無私徹底彰東茆蓬妙宗禪人乞偈化米新關東菴已十年道心每結水雲禪雖然笑臉從人妙空腹難教飽白泉化布袋十字街頭笑逢人覓布袋看誰發妙思會取此三昧題扇示慈雲禪人掌握分明任運彰全憑箇裏現清涼此時若不開惺眼更待何人為舉揚丐大銅鍋偈大冶爐中久煉烹全身脫出體崢嶸頑金且喜成法器好與叢林調衆羹寄白雲子素後堂法社凋零值晚秋殘丫敗葉亂峰頭白雲高突孤巖上自有瞻風意氣投即事囊有千金重看來亦是塵自從家喪後羞見錦衣人受普寧請答諸禪德砂鍋久閣白雲邊煨爛虛空不記年今日既逢調鼎手何妨掇出共烹煎回閩省親鐵鑄肝腸忤逆兒面皮翻轉已多時只緣觸著娘生底千里迢迢涉水泥送僧之武夷武夷山色正秋清此日辭行動遠情折筍峰前景未勝為余更覓一崚𡾓除夕生涯蕩盡沒纖塵掃落年華徹骨貧迷悟總途誰得失賢愚同體孰疏親一爐冷暖今宵火半榻清間此夜身翻笑水雲無定力幾隨杖笠欲迎新金粟主山巍然突出勢孤雄朝拱群巒獨露中堪笑當年點數者如何到此卻迷蹤神書藏經大藏由來不較多揮書一夜竟如何雖然顯發神通異弗落毫端會也麼寄友睡虎峰前送別時竹林秋色尚依依于今屈指春將半幾見殘花又放枝鏡菴坐雪幽然兀坐絶思惟何事天花繚亂飛堪笑上蒼多意氣擬來漏泄野僧機聞孤松壽徒訃燈下四吟篝燈獨坐不成眠驀地追思暗淚漣苦我一身林下老愁同松際夜濤宣一株挺出群峰外榜樣山門望汝先豈料毗嵐吹折後蕭條猿鳥兢悲憐雪霜堆裏獨孤標臘盡方知歲後凋今日忽成無影樹為誰景致別山招成林獨樹已稱奇天不全才亦汝悲借宿溪邊開夢眼再翻斤斗是真兒過江郎跨盡危層觸斗傍遙觀三片勢昂藏天教俠骨難遮蓋特與人間作棟梁示慧初上人發足泉南一念時慧心初照了無依不從個裏開惺眼盡是區區客作兒御書樓層巒疊疊彩雲飛千載如同御駕垂休問樓臺存與廢秪今泉石尚流輝仙螺池體態分明出自然為何去卻尾巴尖看來靈異成奇特磊落清波個個圓鉢盂案盡日門前口向天不曾輕易乞人間須知本有生涯別吸露餐雲那計年九龍戲水群聚雄雄露一班慣能滴水起波瀾休教打濕袈裟角試為傾湫倒嶽看治升董居士薦室請偈從茲踏著來時路赤體條條信步行踢脫靈光隨處現超然獨自證無生甲午春贖大塢古院基樹古剎何年廢墜來尚遺老樹護蒼苔為憐刀斧傷心處留與空門作棟材和海寧顧邑侯韻灰頭垢面擬何緣驀契當機只一拳獨脫無依窮徹骨休來更索止啼錢示法則禪人善泥水石頭大小皆成器瓦礫零星亦妙機三合土中立腳穩縱橫何處不風規中元薦親胞胎未出識爺娘一度追思一度傷數陌紙錢隨例設粉身碎骨卒難忘示星幢師姪銀河點點孰安排此段風光莫浪猜冷地賺他窺得破至今猶恨雪山埋坐大展記室寮觀桂偶成觸目難禁物興長乘時敷展悅秋光老僧不解多饒舌噴鼻隨他自覺香除夕述懷逐隊班班是瞎驢相看歲暮笑云除忍飢不暇無他策篾束三條樂有餘解制有感腳下家山路未還草鞋今著出松關擔頭春色分明道此事須教不自瞞寄天孚上座翔鳳山前狹路逢眼開誰不笑春風歸來上國情何似莫負生平氣象雄示華嶽居士曠大劫來一著子多生培植此時身此身墮在閻浮際夢破方稱出格人示幻觀侍者十載巾瓶幻侍者朝參暮請我何為今朝看破無多子始見人人鼻孔垂示心宗上座汝在吾邊親近久朴實頭見不道無恢廓此心能變化門風終不倩人扶募興造扷盡千山水支撑古道場必須擔荷漢出手共扶揚化豆冷灰豆爆是何時信手拈來顯妙機磕著者些消息子方堪受用大家知化醬缸紅爐拶出口空開日用無私任取裁漫道當年不曾少全憑個裏曬將來化齋米問禪不會玄妙落筆全無孔周只有些兒快樂敢言飯飽便休休休驀地撞他如信及瞎驢肚大不須愁募藏閣一標獨插待何人正是今朝應現身就手揭開心地藏重重樓閣盡光新明初許居士為先室行敏請偈薦拔採得空華結衆緣善根彌布福彌延施為本有風光事足下香飄朵朵蓮真讚雪峰亙和尚像泉水逆流突出者漢花劈鴻蒙宗風顯煥打頭為人處古佛未足稱慈徹底掀翻時白拈猶欠手段盡道曾郎示後身誰識古今同一貫咄莫驚嗟重判斷閩邦從此不安寧個個瞎驢恣鬧亂棲霞禪德行樂圖未剃髮道汝是僧儒者其形道汝是儒釋氏其名儒耶釋耶吾不得而擬形兮名兮吾不得而評然則公之造詣果在斯乎弗在斯乎咄背觸兩非渾坐斷蕭然獨逸古松青敬安師像吾不識翁翁不識吾揮毫擬讚迥絶名模咄端然兀坐明何事淨信中興始見渠朱問心居士像問心何似了心嘉瀟灑行蹤樂水涯周易展開讀未盡夢回消息笑空華跋平陽弘覺和尚為張明遠居士所題真讚利名滿世走天涯誰把身心歇片時兀爾忘緣苔石上多君占盡好便宜好便宜不多得然獨云居士占盡者吾不知居士何所窺覷而得此段快樂耶雖然還識弘覺老人因風吹火麼面目分明風規可慕當為鑽頭入鬧恬不知返者警焉張舜法居士請為先嚴明南公像讚者漢面目初不相識才到鳳山自討棒喫誰知暗地惺惺搆些衲僧氣息且作麼生是衲僧氣息明翁明翁橫拈如意謾矜誇獨露當陽無等匹浩如大展二上座為母超琛并自像請題幻泡漚花聚會緣空門有子共歡然笑拈如意彌今古手握輪珠不記年挂拂藤床唯侍坐即離此用任舒展好將者段真消息直透威音那畔前棲水玉聲德聲昆仲請為先嚴聖裔呂公像讚湛湛棲水點點澄清有公實德玉振其聲所以能向鳳山發多生之勝願深心為法作請藏之主盟世出世間奇特事臨行撒手了無生鷲生禪師像一杖春風何處行芒鞋擬踏萬山青滿懷心緒誰知委分付蒼松仔細聽月臨上座像擬子成標格如何早去身個中親切句尤喜念頭真張道婆行樂圖金剛固體彌今古本有風光受用多百八輪珠常轉換笑看歲月任婆娑汪際斯居士乞題父臨終所畫大士像面目分明儼然自在我觀大士無此體態際斯際斯有體態無體態毫端認取自家爺始信風流格外塞文益禪師像菴名福田貌古春容道行堅鋤頭今放始安然知公已得栽培力受用多生在福田東來戒子像歷劫薰修此日間便宜占盡一蒲團不知明什麼邊事貌古神清只笑顏福嚴老和尚像最苦師心三十載維持法化血腥飛浣清歷祖源流派杜絶諸方濫續非事屬至公天地震道弘正直鬼神悲話行早已遍塵剎鐵案高懸萬古輝其二口懸河兮眉挂劍掣開岐路絶廉纖葛藤窠裏清王化奇特須還老白拈自讚翔鳳大衆請闢草開荒此鳳山業緣多纍債難還不因衲子成叢席爭得龍天展笑顏既無道德遺身後那有風光播眼前珍重諸賢齊側耳水流松韻莫嫌繁至卬方首座請最無面目是者村叟不解蜜棗甜人只會黃連苦口明知良藥足堪嘉多少攢眉而怖走休怖走幸有福塘方座元卻諳此味能分剖法立系西堂請碓觜花開早漳州出汝來棒頭遺毒種喝下破疑胎幾多人努目獨汝恁癡呆法禪應有鉗錘別莫學吾儂始俊哉嵩菴正藏主請咄哉者個村阿呆世上有誰似汝呆孤迥砂盆甘淡冷赤貧拄杖樂徘徊只有一端人莫測冷灰豆爆出英才嵩藏主與麼來描得吾真成禍胎子素學後堂請標格由來具孤操樂此生炎涼不到處笑傲萬峰青分付素禪須記取吾無別著可彰名鐵山岑維那請我像難描畫描畫終不真惟茲一著子據令絶疏親分付鐵禪弘願切何愁祖道不光新利禪恆藏主請阿誰不識你高踞鳳山中弗顧門風冷只貴钁頭蹤幸逢賢衲子輔弼梵王宮如斯四十載快樂住山翁利公親我久描我容要知我無奇特處唯有真實心流通實相卓知藏請老漢從來無造作據實提持乾爆爆白棒指伊看變化龍自昂頭蛇自縮應驗當前辨若親為人眼目方不錯巢風林藏主請閻浮多厭汝頑賴不知時鐵船撑逆浪禿棒抵須彌人皆驚覆沒汝獨強維持咄哉巢藏主膽大莫愁眉大展翼書記請混混沌沌朴朴憨憨佛法不會世法不諳占住鳳山三十五年虛名遍布罔顧思慚所以讚我者愧無是德毀我者是真實言賴有展禪多意氣攜笻信荷在吾邊璨衲章知客請愛問壺公山如何在興化十箇有五雙無人答此話汝在吾邊住有年幾番拶著幾驚怕今朝始信絶心思覿面分明無縫罅無縫罅暫且深藏巖谷中漫將輕易與酬價薦穀曣藏主請白棒當陽點靈苗觸處花原非吾妙力有穀自生芽止水智藏主請自笑無心住芒鞋被業牽破盆存古格瘦骨獨撑天賺他龍象衆讎結盡含冤止禪不憚親吾久此段清標要卓然德水洧侍者請卓立孤峰上天擎世外身為憐山骨老更愛水源深祖道悲秋晚宗風痛日沉德禪能勉力不負草年親荊石侍者請眼豁乾坤小胸涵萬象空為人端的處拶到水山窮珍重西江震侍者全憑者著是吾容英衲毅禪人請減劫時逢法運秋白雲愁靄滿山頭不辭瘦骨撑衰力猶把孤笻絶衆流英禪者志氣優果然不負靈山囑堪起吾宗向上籌乾一知藏請問禪禪不會問道道不知手提骨律棒兀坐擬奚為覿面乾禪應笑破風光本有好施為英發知客請會取吾無相是名真供養請子自揩磨英概吞群象吞群象遍界覓無相似渠始見鳳山真倔強元畸知事請吾住茲山無別提持諄諄顧本依古行規汝稱知事應勞苦臨危不變始光輝東來戒子請者箇老禿翁時事太朦朧有十分古朴無少許春風提持惟據本直道以弘宗廓落身心明似鏡任他龍象競趣從佛事挂板師捧板云百劫千生打成一片懸挂高堂風光顯煥即此是叢林紀綱即此是衲僧關鍵且道聲前一句分付阿誰遂擊一下云號令甚分明當陽不隔線又師云古聖垂慈芳規建立無非欲諸人領取釣頭意莫認定盤星然則者箇是定盤星作麼生是釣頭意伶俐漢一覷便透如來禪祖師禪驀鼻牽來好痛拳如或未然聽取下頭注腳鳴板一下云分明只者是不悟待何年為東明孤雲和尚火南泉三不是趙州一箇無冷地驀相磕拍出谷谷呱不知是甚義寒拾笑盧都仔細拈來看元是東壁挂底大葫蘆大衆今日為我孤法兄茶毗因甚説者般話遂擲炬云知音説與知音聽一道清光入畫圖入塔勸君先上東明去我即束裝隨後來者便是老兄當時留戀此山底句既親言出自親口今日又親自到此更要小弟説個甚麼雖然當陽顯露衆眼難瞞驀地收歸兄自道取遂捧起骨櫬云拶破虛空無縫罅任他千古水朝宗為韜明和尚起龕師云久默斯要不務速説透體金風趁此時密移一步是高著遂以拄杖引之舉火師云不可思議法惟兄説得妙火焰三世佛立地聽呼召鞭策泥牛吞大海指教木馬啖空鷂縱橫妙用顯神機搖落天花多瑞兆大衆此是堂頭老漢末後全提與諸靈山受囑列位金湯心眼相照共作證明底一段殊勝因緣若也見得知恩報德只在今朝其或未然鳳山更為者漢播揚法化去也遂擲炬云頂門迸出一輪紅大千何處不光耀入塔師云恭惟法兄和尚以一條白棒掀天揭地惱亂叢林三十餘年垂功立業既遇昌時羅龍打鳳一滿心懷先師未了公案迎恩渡一時復見光輝我兄同門出黃浦浪千古咸驚險峻所以有如是造詣具如是奇特驀地翻身迥出尋常預知得地天然受用且正當恁麼時如何是天然受用一句坐對浮屠忘彼此從教人喚法中王為慈門師太封龕老師行處人天莫測瀟灑風規快樂自得惟其自得所以七十七年來履踐如霜孤操不易如今懶聽閻浮歌白雲深處藏蹤迹蹤迹既藏是汝諸人還知者老師落處麼遂掩龕咄一咄云當陽坐斷誰敢辨的起龕翔鳳關前雲泛白鉢盂巖下水流清到頭一著無多子千聖咸歸此路行遂以拄杖卓一卓引出舉火玲瓏巖畔久稱揚佐助先師道念彰末後茲山多意氣今朝受用好風光好風光絶比量遂攛下炬云全憑者點無私照贈送雲蹤去路長為嵩嶽監院火多年為衆監院今日山僧監你上是兜率陀天下是風輪水際東西南北俱玲瓏任汝逍遙隨所至正上座須記取臨歧無可贈行蹤末後全提只者是便燒入塔超生脫死全憑者箇獨露當陽了無話墮乘時占得好風光全身直入裏頭坐裏頭坐休錯過三台須是大家催再出頭來重唱和指琦維那火數載辛勤綱維法令叢林得以雅觀衲子亦賴安靖此是汝赤心片片助揚老僧底事正當今日格外翻身又將何與人通信擲炬云萬別與千差一椎俱打正覿顏柴頭火南山樵盡北山樵堆積今朝一火燒惟有一株無影樹披今歷古赤條條諸人還知覿顏禪人於無影樹下超生脫死否若也未知老僧更為點破擲炬云不識東甌橘皮紅疑殺波斯舌頭赤文光禪人火衲僧家要來便來要去便去延遲至今猶涉鈍置絶鈍置請看腳下焰騰騰便是文光安樂處聰睿莊主火毫釐繫念三塗業因直饒一念未生猶是死水裏浸殺此是汝舊冬見處今日逗到者裏紅爐焰猛生涯路盡又明甚麼邊事咄還鄉調古無人聽申謝油餈絶衆疑為禪人火皮囊已脫卻精靈在何處直下便知歸開眼不受蔽既不受蔽且道煙消火滅後又如何指的擲火炬云路逢知己丙丁公爍破面門秪者是象開禪人火終日跛跛搭搭向外馳求挨到今朝猶未心休何故晴乾不肯去直待雨淋頭擲炬喝一喝云劫火洞然燒卻了腳跟翻轉倒天流月修火頭火長年為衆燒火今日老僧燒汝汝燒火我燒汝如是因如是果擲炬云根塵器界盡消鎔透出光明淨裸裸濟生禪人火撲面霜風冷千山雪未消衲僧行履別任運樂逍遙是則是忽有人覓你河南信又將何秪對擲炬云眼開無一物唯有赤條條澤超禪人火山露連纏骨水流不斷斤莫忘今日事須記此時心且道如何是此時心以火炬打圓相云鐵鑄金剛圈一箇一回咬嚼一回新智恆禪人火恆常為衆募鹽本色衲僧流分明汝一箇直下便翻身悄然無話墮既無話墮秪如遲延四十餘天又思念箇甚麼呵呵擲炬云莫忘鹹淡自家知今日消歸火裏坐湛輪相侍者火吾不辜負汝汝豈辜負吾如何卻與麼使我老心孤孤孤語水血流書不盡勸農多説也難模遂呵呵大笑云無端無端擲炬復喝一喝云不如一火燒卻免教彼此分疏入塔師捧骨襯云巾瓶十載念切叢林只者去處是汝安身呼應不堪重話會斷腸聊慰裏頭親且道親箇甚麼遂送入云從前盡道間相識今日方知是苦心少眉禪人火衲僧行履處最苦病魔縛撒盡肚腸空今朝始安樂雖然安樂二字是山僧道底作麼生是你應時及節受用一句遂攛炬云會麼雙眉展起焰騰空雨灑行蹤阿漉漉飯頭定心禪德火不用瞻星望月全憑者箇時節時節既到來大衆都歡悅且道歡悅箇甚麼羡汝識得定中心飯是米做鍋是鐵忽被南泉打破普化踢倒時又作麼生遂攛炬云豁開兩眼辨端由馬面驢頭俱照徹湛如禪人火衲僧家要來便來要去便去家家好風月處處安樂地何必徽州與休寧日日聲聲念不住阿呵呵一火為君燒卻了湛如秋月照人間淨朗禪人火未過洛陽橋風光俱遍該不知為甚麼空著草鞋來雖然不到水窮山盡處爭肯翻身撒手罔撒手回死生箇裏無他路趁踏紅蓮火內開遂投炬值牲慈茂火癡癡憨憨醇醇朴朴苗稼不犯安心自牧鼻頭拽脫了無依撩起便行真快樂秪如人牛俱忘且道是何面目以火炬點兩點云休開兩片錯商量翻身直入無生國不較上座火不較不較到此更須覺照惟有靈明一著子了無奇特與玄妙既無奇特玄妙且道還有親切相為處麼擲炬云爍破者髑髏突出頂門竅遍也上座火今日是上座絶後再蘇底時節若也見得葉落歸根同得旨菩提觸目共全彰其或未然火光三昧與上座證明去也喝一喝擲炬云切須看取鵠林維那火師呈炬云者便是鵠林上座末後一段光明幢山僧今日特為點出諸人還知者上座落處麼若也未知攛炬云罰錢出院成何事恩怨分明在此中鍾解脫火昨日鍾居士今朝解脫僧方剃染遂歸寂即建普同塔者何緣得到此撒手法王城只如末後一句又如何履踐擲炬云烈焰光中聊寄足普同受用待功成巨範則副寺火吾望子有發達之日子思我有末後之句今日方知不汝欺受用頭頭合本據且作麼生是本據火焰説與諸佛聽諸佛聽未真火焰説未是吾今不再三遂炬云會取箇中意聰聞會禪人火多年為衆竭力今朝方始心休休休不須向外從他覓一念知歸便轉頭且轉頭後又作麼生擲炬云本來受用全憑此觸目風光任性遊素慥汧西堂入塔師捧骨襯云衲僧造詣迥絶追攀揭露當陽徹骨冰寒三十年來真履踐人天目擊盡歡顏雖然此猶是西堂素公覿面相呈邊事秪如物外翻身密不通蹤又如何與伊安置遂送入云葉落金風消息至雲拖秋色入松關松江二禪人入塔一對雲間客煙波泛渺茫今朝齊到此穩坐自家鄉大衆家鄉既已穩坐且作麼生與伊證據遂提起骨云描畫不成人世外風流徹骨絶商量為孫弘寰父母入塔夢幻浮生事已周賢郎送入此山頭此山已植多生福福被多生享莫休大衆此是山僧為弘寰兩尊人末後表揚底句且團圞聚會又如何舉唱遂送入云覿面將相無異路各歸本際樂同儔清如耆舊火舉火炬云大衆此便是者上座生平為衆真實修持得一道光明幢山僧今日為他覿面點出直令未發道心者互相協力已發道心者同聲讚歎讚歎則且止且道者光明幢又向何處著落遂攛下火炬云返本還源秪者是輝天鑑地自如如青蓮老師火明知生是不生之義因甚卻被生死之所流轉若向者裏會得烈焰綻青蓮馨香遍界該彌今又亙古無去亦無來既無去又無來是汝諸人還知者阿師落處麼遂攛炬云青山緑水全身現那箇男兒被活埋慧林禪人二親化柩皮囊拋卻已多年猶自棲遲荒草邊驀地掀翻舊骨董分明絶後又光前只如同條合命一句又作麼生道覿體元無異死生不二天木頂禪人火因虎傷木禪人聽指示尋歷江山計有年佐助宗師未遂志到頭一著自家知撒手今朝安樂地大衆且作麼生是渠安樂一句虎口翻身自在行大千何處不遊戲朱解作明采火若論此事如解水一般牽來拽去必得兩破始肯放手只如放手後又作麼生符到奉行天已夜星河燦爛任翻身道戒禪人火尋常用得著今朝都不是合眼細思惟安身在何處道禪人休擬議遂擲火炬云只此明明不覆藏莫教錯過自家底慈濟禪德火慈濟慈濟你卻分明到山才一日撒手便歸程生平受用無多子收拾春風入化城行狀門人超正等稽首謹述師諱行觀號靈機閩之龍溪周氏子母翁氏生師之夕夢一金神入室衛從頗盛忽香光馥郁而誕闔屬稱異師幼不茹葷及丱讀書山館偶觸無常境界遂與本郡慈雲師遊有師資之誼一日默思禮誦非究竟事由是悲悵日增以至胸次負疼時費隱容老和尚主黃檗有僧持語録至展讀如獲至寶屢欲往叩又為他緣所絆既而因事發憤曰大丈夫若以利養是圖則陷身不義矣遂舍去禮金浦九雲寺慧曇老師芟染曇耆年有道行為一方推重見師志不群乃欣然曰子乃法門令器詎可虛滯於此吾年雖邁當送子行腳也即束裝偕師出嶺曇途次染恙趨寂於逆旅師抆淚津送入塔雲棲禮別渡江首參密老和尚於天童才人事同謁僧擬問連遭痛棒師在傍佇顧被尚以杖驀胸一𡎺曰汝者死漢倒退階下心眼昏迷少頃乞進堂日用只疑驀胸一𡎺汝者死漢反覆看來我是活底因甚喚作死漢遇晚參師出問未審老和尚有佛性也無尚笑而起捻住喉嚨擺兩擺曰汝者阿子無佛性師彼時如在大火聚中跳出自此參究益切雖役重務未嘗放捨是冬稟受具足戒焉明年甲戌聞費老和尚應金粟之請復過武林休夏龍居偶閲禪關策進愈加猛礪灼見古人為生死不憚風霜三二十年方成一片了徹大事豈是容易得底於是晝夜常坐不臥只看個無字或倦即倚柱少息又得泉南修上座警發師依而行之殊覺省力不勝欣忭期畢腰包上金粟見老和尚挂單禪堂踰月徹夜不眠恆立法堂前參究一夕雷雨驟作電光閃爍不覺無字話頭脫落山河大地凝成一片歡喜踴躍歸堂倒身便臥時鄰單問兄微耶何放逸若此師曰待我睡一睡向汝道一衆驚悚有止止師特入堂問一靈真性不假胞胎時如何師以手驀掩其口止不肯曰不是者個道理師高聲應曰三十年後乃趨入方丈問世尊未升座文殊未白椎還有佛法也無語未卒尚拈拄杖徵曰且道即今是升座不是升座擬對便打出自忖我本惺惺為甚拶著又去不得遂移入圓寮每日只默坐不輕啓口尚見師真率命遷侍香一日因二僧請益尚據曰左邊半斤右邊八兩師於此豁然無疑呈百丈再參頌曰當機歷驗示全提忽地一聲絶謂情禍入己身猶自可那堪惡水又澆人尚閲畢復問頌也任汝頌且道三日耳聾意旨如何師沉吟間被尚振威一喝拈棒呵曰汝恁麼見解平地上死人無數當機不來盡成虛誑師是時白汗迸流會得全機大用復呈無字頌曰狗子無佛性當風須照顧擬議咬斷筋莫言不分付尚大笑稱賞從茲腳踏實地一切成現無纖毫窒礙不被從上佛祖舌頭欺瞞尚一日問興化打克賓意旨如何師曰憐兒不覺醜尚曰既打趁何謂憐兒師曰也要和尚具隻眼尚便掌曰要我具隻眼那師曰不是學人恁麼爭見得和尚尚休去又侍立次尚問世尊拈花意旨如何師驀豎拳尚曰不得喚作拳頭又作麼生師便與尚一拳尚打一棒曰且道是賞汝罰汝師曰少賣弄尚頷之師侍尚十載機緣頗多具載録中一日尚謂師曰漳州出汝大似糞掃堆頭一顆明珠又曰汝是金粟門下一枝鳳毛汝之頌古宛有白雲端作略師雖屢蒙記莂益自謙晦崇禎癸未冬舉師立僧越明年解制師欲把茆住山以告尚從容謂曰昔仰山語臨濟老兄向後於河北有個住處後臨濟果在河北大闡宗風看來吾人住處亦有定分豈可強為師拜領慈誨未幾有湖州楊墳資福之命尚令侍者喚師至囑曰汝欲把茆今翔鳳山前有古寺基當就此居之師乃受命拜辭至山實甲申三月十有三日也師初住時闢草開荒刈茆縛屋凄涼盈目豺虎為鄰人不堪其憂而師怡然獨樂師又律身最嚴同衆食息雖一果一菜不私於衆故禪學之士亦不辭勞苦戮力經營漸成叢席雖雲廚屢乏而參請無虛日單提向上勘驗方來由是雲水麇集辛亥秋復主福嚴三稔甲寅九月衆請還山法席愈盛四方宿衲遠近緇素嚮風而至惟恐居後圍繞者不下十萬餘指矣於戲益知曩時老和尚為師諄諄囑付信有徵焉師住持資福三十八載凡樵採之山安僧之地尺寸皆售衣鉢親置師於茲山雖稱重興實開法第一世也始則草屋荒基不蔽風雨終則瓊樓絳殿金碧交輝凡叢林所宜有者無不畢備兼之門庭嚴冷清規整肅諸方長輩咸推尊為楊岐高峰再世云師受生於萬曆丙辰正月草三日寅刻示寂於康熙辛酉九月草九日子時世壽六十有六僧臘四十有九遺命塔全身於本寺龍山之陽付囑弟子草一人有語録上下卷行於世翔鳳山顯忠崇孝資福禪寺靈機和尚塔銘葬者藏也後世務為崇碑巨碣勒石徵詞諛墓已非古矣況宗門大士視其身不啻蘧廬之一宿暨乎埋骨荒丘鴻爪蟬翼無復顧戀而世之所號為能文者流乃以窺測傅會之見繪飾而塗澤之何足當識者之一笑乎雖然當正法凌夷魔鬼互熾而得一人焉特提向上宗旨壁立萬仞斬盡葛藤俾依聲附影之徒斂迹卻避其有功佛祖甚大則于靈機和尚身後之銘不得徒作語言文字會也師姓周閩之龍溪人諱行觀靈機其法號也母翁夢金神入室而生幼不茹葷血稍長讀書山中偶境觸無常遂懷出世之想有僧持費老人語録至者反復省誦如飲沆瀣即芟染禮九雲寺慧曇為師曇一見歎曰子將來龍象詎可虛滯于此吾雖老尚能伴子八十行腳耳未幾曇以疾示寂旅次師抆淚津送如禮渡江首參密和尚痛加爐錘師自謂如火聚翻身參究益切是歲稟受具足戒每晝夜止看無字與泉南修上座互相警發時費老人主席金粟師挂單禪榻一夕雷電驟至不覺無字話頭脫落山河大地凝成一片歡喜無量歸堂便臥鄰單問子徹也何放逸乃爾曰待酣睡後卻向汝道一衆驚悚師侍香次因二僧請益費老人曰左邊半斤右邊八兩師于此豁然呈百丈再參頌曰禍入己身猶自可那堪惡水又澆人隨勘驗以三日耳聾意旨沉吟間更遭呵罵汗下浹背益領會全機大用又呈無字頌深蒙印可從茲一切成現毫無窒礙機緣甚多俱悉語録中費老人嘗語師曰汝之頌古大類白雲端真金粟門下鳳毛矣舉充首衆復囑曰汝欲把茆今翔鳳山前有古寺基當往居之師遂應楊墳資福之請始至誅茆縛椽荒涼窘乏師一果一蓏不以自私故學徒亦不辭況瘁經營漸成蘭若其後信施委積自殿宇以及寮舍庖湢煥然一新雖曰重興實與開山創建者等復主福嚴回值六十誕辰緇素雲集聽法不下十萬指至康熙辛酉九月二十九日泊然而逝距其生萬曆丙辰正月草三日世壽六十有六僧臘四十有九遺命塔全身于本寺龍山之陽付囑弟子二十一人師門風高峻足迹不下山麓者三十年尤疾末學盲師語録刊布之弊凡結制晚參諸語皆順世以後弟子追輯所聞什不存其一二此與雲門法語呵止流傳入其室者至以紙衣繕寫何多讓哉乙丑秋豫謁笠翁和尚于理安而師之繼席法嗣嵩菴道至翌旦笠翁遂以書扺會城介其座元夢菴來請笠翁為諸方碩果而師尤余素所企慕而不得見者乃稽首為之銘曰猗歟密祖豎大法幢天魔釋胄不戰而降費公繼之梵門角虎益火熾薪舍利如雨師生閩海蓄泄雲濤髫齡剃染杜謝塵勞瓢笠往來天童金粟熱喝猛提黃葉止哭研究精進金斷石穿孰主孰賓有實有權踰月經行脅不帖席獅子忽眠同參褫魄當機悟徹撒手懸崖法筵重寄往哉汝諧寶座雲邊丹甍樹杪不起于座人天圍繞末師稗敗誑導群蒙階前售拂賤等秋蓬師提祖印擯棄一切揀沙是金褁門皆鐵吉祥示化師其未亡晨鐘清夜法音琅琅康熙二十四年乙丑八月望日賜進士出身文林郎原任河南開封府祥符縣知縣行取大計卓異欽賜袍服薦舉博學宏辭賜宴體仁閣前彰德府推官癸卯科文武同考官遂安毛際可拜撰先師語句恐學人泥於文字概不存稿雖有順世升座小參諸法語書挂水牌隨命抹去不許謄録翼自壬寅冬親近先師匝歲命入侍寮問諸久侍前職和尚所説法語機緣曾録卷帙否僉曰未曾即有不過潛鈔密記一篇半偈而已爰是東鈔西録裒集數篇候師住持事餘呈稿求正師正色曰既學別傳之旨咬人屎橛作麼翼再拜長跽白云二祖阿難為佛侍者凡佛先所説法未曾得聞懇求重説佛為慈愍未聞更為宣説所以阿難後來結集三藏如水傳器一字無遺趙州不許人録至今語録流播天壤至如鄉音南北楚夏不同智無慶喜之明識乏紙衣之敏互有潛鈔密記難免魚魯參差雖杜今時之弊反貽他日之瑕伏望和尚大慈俯垂覽正開示將來使正法眼流通末世師為動容矜翼愚衷指其字句差誤隨即録正先師曰不可與人亂鈔禪和子眼腦不清烏焉成馬者多故翼謹祕篋笥不敢有違嚴命第愧記性愚拙不盡什之一二耳至康熙己未請假出山養母繡州稿亦懷之以歸辛酉九月初老人示疾遣人呼翼至榻給侍彌月至草九日示寂嗚呼人天眼滅法棟傾頽翼等孤露無依碎身莫贖至卬兄繼席翼欲請商結集語録之事見至兄住持事冗因不敢言乃返禾中後至兄捃拾輯寫語録稿尚未編定八月間復溘焉長逝由是嵩菴兄繼住無何先師剃度英衲師索先和尚語録入都嵩兄即將至兄所集之稿送南澗敘次天笠和尚閲之乃曰因甚差誤多端大非昔年之句須得原稿方好況靈法兄真得大機用從胸流出一字一句不可改易嵩兄因北行遄促催請作序以冠卷首其中句逗字義種種差訛係前捃拾傳寫之錯非天和尚之咎斯時翼總罔聞後知之即送原稿入山業已刻行數年以來高閣不印海內禪人以不見先和尚語録為憾江浙緇素曾讀刻本者又多以改誤為嫌翼見紛然異同欲將原稿翻刻令大唐國內見先師真面目活語句以息意逆改壞之誚癸酉春備員鳳山值歲荒力薄日夕抱疚適新安白雲子素兄屢頒手扎促為刊正至有死亦瞑目之言因復其待時稍稔不但遵法兄命亦翼應為之事也去夏冒暑走雲間求沈南季護法與吳日千先生序以申重刻之由凡翼記集始末次序間嘗聞命先師一字一句不敢去取備録而悉刻之以俟同門諸兄法眼或後繼起者再為刪刻翼之汲汲此役畏未刻者將淹沒無傳已刻者終差舛失正蓋出於不得已也且道先師正法眼果在斯録不在斯録閲者請下一轉語康熙三十四年七月佛歡喜日繼席翔鳳顯忠崇孝資福禪寺門人超翼百拜謹志重刻靈機老和尚語録後跋鳳山先老人道風孤峻有江南小釋迦之目煆煉學人單提向上一著凡衲子到山必搜索行笈不容挾片紙入參堂其生平語句敲骨見髓斬絶葛藤第不許繕寫流傳故人見之者罕逮老人示寂後有弟子某為入都行促匆匆鏤板舛誤頗多大展和尚慨然起而釐正之悉依當年親聞時紙衣所録不敢增減隻字所謂遊夏不能贊一詞也而老人真面目于是乎出矣從上祖師莫不有語録垂世多或纍函少或數紙皆所以開人天之眼目資來學之津梁使或淆訛舛錯則作者之光明埋沒何以開悟學人其獲法門不少和尚此舉良非得已也和尚繼席風山道不讓老人其光大祖庭功難為策勳第一光大祖庭屬家事而點出光明使諸方得見正法眼藏此天下萬世之利孟子之功豈在禹下哉録成和尚命侍師益三來徵蕪詞附後余固初參和尚亦家裏人也烏敢辭焉乙亥七月七日平陽學人盛遠拜跋
