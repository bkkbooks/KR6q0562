body:
  text: 嗣法門人超洧超源定禪昌賢等編頌古世尊初生廓落娘生面橫身便截流軒昂吞宇宙大地孰為儔世尊升座文殊白椎云諦觀法王法法王法如是世尊便下座腳跟才動涉淆訛更把鉤牽犯手多盡謂機前都漏泄詎知平地起干戈長爪梵志與世尊索論議深藏鬼窟建升平何處消間可樂身陸地踢翻波浪黑豁開天日見全真世尊因乾達婆王獻樂一絃撫動顯靈機物物頭頭盡展眉妙運風流多意氣卻將迦葉作猜疑世尊於涅槃會上以手摩胸告衆覿體風光杳莫名摩胸告衆已多爭醫來死馬成何用賺及平人落火坑世尊示寂金棺從座而舉高七多羅樹開口已經遭打殺臨終又賣醜行藏生平浩氣難收拾死到棺材也發狂武帝問初祖如何是聖諦第一義有貨不愁無買主如何賤把本錢虧分明有理終難訴獨自凄凄暗渡歸祖命門人曰時將至矣汝等盍各言所得乎最後慧可大師禮拜依位而立祖曰汝得吾髓潦倒胡僧入草深令人白日暗中尋神光特地施三拜也是門栽荊棘林百丈野狐脫卻破㲯毿通身衣錦歸雖然榮耀極埋沒自家威臨濟上堂次兩堂首座同時下喝白刃交鋒絶擬倫才分利鈍喪全身鉤頭有餌難吞吐傀儡抽牽見活人臨濟示衆云大凡演唱宗乘一句中須具三玄門一玄門須具三要有權有實有照有用汝等諸人作麼生會便下座藏身只在一毫裏鬼臉揉來面目殊誤賺許多迷夢客攀花折柳逐岐途三句一筆丹青畫不成更加點綴始分明縱饒巧設多般態何異靈龜拽尾行臨濟應機多用喝會下參徒亦學師喝家門弗禁每招災惹得韓盧逐塊來徹困老婆心未死猶憐稚子不成才臨濟將終云吾滅後不得滅卻吾正法眼藏千年鈍鐵夜生光聲價遼天孰敢當不意逆兒先捉敗等間拋出賤如蜣趙州訪二菴主尋常家活人人具一種風流識者稀三寸舌尖鉤鎖處誰能指出趙州機國師三喚侍者三應三呼負汝負吾慣將惡水覿面糊塗咦遍界明明藏不得何須特地費分疏首山竹篦子腦後拈來活似龍當陽獨脫杳無蹤堪憐滯殼迷封者海闊天遙路不通大梅住山後馬祖令僧往問曰和尚見何道理便住此山梅曰馬大師向我道即心即佛稱錘落井不須尋擬欲追蹤墮更深徹底窮源無變易豈墮塵世逐浮沉香嚴上樹現成風月沒多般上樹生涯卻似瞞笑裏賊身藏不得惡聲流布遍塵寰興化擯維那白棒當頭徹骨貧更加趁出絶疏親賺他無限盲聾漢開眼都云打克賓靈雲見桃花靈雲有眼花邊失貽纍玄沙摸壁行入草且深人不委至今狼藉滿江城大溈示衆云有句無句如藤倚樹證龜成鱉意何憨語的言端轉不堪可惜肝腸剖露了空開笑臉卻羞慚法眼二僧捲簾覿面相呈人易會舌頭翻轉許誰知可憐一對郎當漢開眼遭他腦後椎世尊在忉利天為母説法栴檀雕就紫金身特地逢迎意氣親慚愧瞿曇清白眼無端又著一沙塵城東老母不欲見佛川流縱出競奔騰桂棹橫空截未能識得源頭皆是水任他波浪碧層層泗州大聖出門車馬可驅馳酒喫長安正樂時義膽相逢添醉後遙聞千里動愁思陳操見資福街頭驀撞舊商人買賣如何見得真不但兩家都失利從前知己反相嗔雲門一曲老大躘蹱應事乖護身只靠一招牌零零落落渾無樣能使瞻風動遠懷女子出定無端畫地卻成牢一任神愁鬼慟號泥裏刺藏輕撥出等間誰著眼睛高五祖三佛侍立一個膠盆黑夜擲説青道白顯奇言誰知破業郎當子惹得哀聲送出門僧問曹山學人通身是病請師醫山云不醫僧云為甚不醫山云教汝求生不得求死不得抽人筋骨拔人腸勝似蠱家蜜裏礵此是單傳百驗訣不須他處覓奇方俞道婆賣油餈何處春風動故情笙歌堆裏醉平生不嫌陋質街頭露捏出油餈活眼睛睦州因秀才過訪會二十四家書秀才學藝世無強睦老荒疏一點彰公諭有誰遮得眼惹他酸透鼻尖香無業禪師示衆云一毫頭凡聖情念未盡未免入驢胎馬腹直饒一毫頭凡聖情念頓盡亦未免入驢胎馬腹拈出些兒釘眼睛誰知睛是眼中釘謾言擺脫超方外白日愁聞鬼哭聲福嚴容老和尚僧參尚問那裏來僧云杭州來尚云還得江西信麼僧呈坐具尚云不是者個消息僧近前尚便打的的江西帶信來驀頭一拶別疑猜現成三昧都忘卻贏得烏藤到額腮書問老人命代復曾心空居士昨接華翰謂達摩西來盡大地是善知識寧必金粟而稱法窟哉山野道居士不惟數千里外覿面相逢抑且穿卻古今老凍膿鼻孔了也但未能撒手掀翻到古人放身命處所以偈語中雖有本據可窺似未灑落根蒂何故不疑之地時人知有拈提得來早已落二須知威音那畔空劫已前箇箇眉橫眼露壁立萬仞必無待達摩西來方顯發斯端倪耳然山野因風吹火未委居士面門又向何處躲避耶速道速道復海鹽張禹侯居士書接尊翰足三載矣披靡日病未能酬復深見居士為道敦篤猶不我責而又殷殷垂注以好音頻寄愧荷山中何可克當謝謝細讀來示謂向蒙慈誨奚啻振矇但塵緣未斷牽絆者多惟念念兢兢以不克副為懼即此數語以墮細膩泥穿似未直截猛省提究為切須知此事實不恁麼古有抱子弄孫色色如舊之語此段景況願居士勿生異見別作途程只向此處咬著自看塵緣何物牽絆何人然雖與麼貧衲有口終不説破須是張禹侯自肯點頭方敢指出且道指出箇什麼速道速道復福嚴靈嶽和尚祖庭重任非有力大人莫能荷負吾兄繼席三載道望丕著誠可謂克家者矣欣羡欣羡茲復退己讓人乃以推舉之責相屬弟何敢當然以愚見別選住持能否未定莫若吾兄久任斯席之為愈也且先人已有惟德是託之囑幸高明裁之肅此布復不一與梁日章居士只是一箇梁日章當下腳踏實地去天下善知識不奈你何何故只為識得梁日章真不受欺瞞若于梁日章外別有枝葉可攀正是拋家浪走于梁日章分上全無交涉來諭所謂説時忽覺清亮過時活如荷莖之露實難捉摸苦苦此苦未是苦忽若風翻荷葉露全歸水梁日章又在甚處安身立命者裏道不得才是苦雖然山野為梁日章早道了也梁日章還覺面熱否與北京張顒侯孝廉士大夫信此道者最難能誠信而力行者尤難今居士既誠信矣力行矣便好將箇無義路話頭拶碎生死窠窟直得信亦不立行無所行便是到家時節方不辜居士一番決烈志氣耳復朱太赤文學二則蒙垂顧不惜眉毛與居士葛藤一上殊覺狼藉不少此無他蓋謂青天白日無處藏賊故不得已和贓捉敗已為居士覿面證據了也將謂直下承當別無岐路誰知偷心未死又來納敗今幸人贓現獲轉送臺前若係真賊計贓定罪若係假賊要求山野慈悲通箇消息好與當頭一棒若諳棒頭落處則便見真贓現前更無消息可通亦無真假之見存於胸次向人定奪可否惟作得主把得定施機發用隨處自在與從上乃佛乃祖及天下老凍膿一鼻孔出氣更非別人雖然是賊識賊未審居士異日相見還解轉身否咄直饒轉得身來猶是竊物以當家寶急須火速拶出蓋天蓋地一段光明從胸襟流出才是法門真種草也又承教謂滯紅塵四十五年也自知不是百年常住只此兩語便是居士歎息光陰省察生死之念切正當此際切忌別覓安身就向此大男小女米鹽酒肉裏輥作一團昏陀陀地上振起精神看父母未生前此段境界從何而有今既推撥不開一口氣不來時又向何處安頓到者裏盡居士聰明知解胸中所有韜略總用不著須是居士刻刻痛念無常時時警覺生死回頭自看看來看去看到水窮山盡處豁開兩眼伸手摸著鼻不覺大笑一場方知此大男小女米鹽酒肉不是別物乃是當人破暗慧炬刮目金鎞借此翻身直入安樂家鄉才是紅塵堆裏快活自在漢也不見唐時有箇龐公看破此事將家財拋棄湘江作一偈有男不婚有女不嫁大家團圞頭共説無生話後來宋時又有箇楊傑翰林摸著龐公鼻孔忍俊不禁亦作一偈男大須婚女大須嫁討甚間工夫更説無生話看者兩箇措大俱是紅塵俗漢各占本地風光便解賣弄世出世間大事又何曾以大男小女米鹽酒肉而作拖纍之見乎雖然更有一處淆訛只如龐公道不婚不嫁楊又道須婚須嫁兩邊不立中道莫居請居士別具手眼通箇消息看因兩次來翰諄切山野亦不覺饒舌至此復沈虎臣居士敬讀尊諭有見道之資而未得入道之要蓋為拋棄利刀快斧不能直下劈破生死窠窟以致奇巧識情蘊為家賊作祟日深不獲自在此病非獨居士無由淨絶盡大地人未得心眼融通便墮此境者比比皆是今無別法為居士曲垂方便但請居士自認自家是家主直據家中堂堂正坐然後左之右之眼見耳聞歷歷分明畢竟承誰恩力而能號令一切當恁麼時向箇裏作得主把得定不被諸塵作鬧好醜存情便是安家樂業時節任他佛來魔來天來神來擬欲窺越此箇堂奧不消咳唾一聲永自回避無門縱使家賊作祟亦不須著心排遣而但云賊賊已自迷頭怖走于無邊方矣此是當人應驗契券執照在手歷劫至今疆界分明無敢移易絲毫許居士更須摸取自家鼻孔與三教聖人鼻孔一耶二耶苟若一二存見鼻孔卻成兩箇未免隨賊奔馳錯認山河作眼睛是還家消息而不為劫掠者幾希向後不識居士又向何處住腳速道速道復海鹽張小白內史山野孤巖抱拙與世疏渺兩蒙台護破格垂注非乘願山頭莫能發此誠至之心而信荷若是耶謝謝承施金牛飯為令公郎百日之囑即舁應供堂招諸和尚子箇箇喫得飽齁齁不惟使令公郎冥路逍遙即尊家亦獲福無量矣山野忍俊不禁為之饒舌讚和云但願春風吹不老瞎驢笑得口門開此復復虛白西堂舊臘爾璘來見所敘述已知上座生平之學殊不介意及見與慈老師夢中一段因緣又知上座有肩荷之志然從上來事任重非輕須有堅忍乘願之力方堪克紹若忽然與麼忽然不與麼則欣厭取舍之念未忘不逐落花紅片片定隨流水碧層層矣更欲山僧禪板發落有何益哉雖然賊原無種慈老師難辭其責現有真正白拈立待上座翻轉面皮始見親切復福嚴古風和尚福嚴祖庭弟已繆住三載兄今光燦師室三年可謂名既正言亦順矣但欲推譽繼席者主行其事與曹護法商議敦請又不在弟為今日之長而區區及此也況師門昆季尋常可否惟兄備悉弟自去秋病目至今昏昧尚未清脫萬一有失正來諭所謂當此時風衰薄之際經歷人情意況殊覺寒心非兄多年舊識莫能發此真切之諭使弟痛感至言也聊此草復統祈垂諒謝謝不盡與至卬西堂書至別後履歷大概俱已備悉但福塘風景未是弘道之時吾徒久戀在斯似非究竟山僧去秋九月受福嚴檀護之請以此心無愧勉力維持而叢林庶得安妥龍象俱各遵規恍若先人冥助之力亦一快事也想吾徒聞此必發英概之志以為人急切之願束裝出嶺互相輔弼以光祖室此是山僧之所重念焉惟吾徒勉其行以慰所望與滇南茹蘗西堂二則山僧去秋九月赴石門福嚴之請雖有數百衲子輻輳其間而朝夕為人提挈殊覺神倦思上座以履真實踐臂力之助而末由所致茲得書欣快殊甚然尤見有殷念思慕之誼故特具數行與上座束裝下來互相輔弼以光祖庭是山僧之所屬望亦是上座利人行志之時也幸勿以筋力不逮他事為辭至囑至囑外法語三則理直詞暢但初則於轉折處似覺寬緩不切宜知之又前七月初有復書一通與上座決志離楚以赴冬期之職不意書未入覽而具豐一燈二禪者至此番跋涉之勞益見上座以遠馳殷切之心念我多矣所寄難得之物次日即專僧分惠翔鳳而福嚴一衆俱感飽鼽之力非山僧所能筆盡其意二禪者辛勞殊甚腳未寧暇又復著渠與涵禪同往非有宿契之緣安能若是惟上座體斯心速斯行毋辜老倒之懷以失衆望不盡復石門曹遠思司理先師主持法門為此寺一代中興當以臨濟正宗三十一世為傳其高僧神僧聖僧別有品列非從上統係所關幸囑諸秉筆者為荷紀年録行實及遺囑語謹以奉覽復曹遠思司理留再住福嚴前接台翰伏讀至再不禁感泣復承玉趾枉顧殷勤獎慰益覺赧汗無地矣足徵大護法深念祖庭而垂情于衲如此一字一句發于肝膈衲非木石敢不銘心鏤骨乎但衲過福嚴時于資福諸職原議以三載為期今百事廢弛人心解散若久假不歸即同棄置若云兩處兼理而以衰邁之年心血枯稿顧此失彼得不為智者所竊笑乎至于同門中別請實天童讓迭主之式既曰嗣法者例皆有分即宜次第住持庶為法門盛事非僅為飭讓以息諍也承護法之所以諄諄誡勉者本為深體令先慈之德曲盡金湯之誠在衲于勢必不能留于理正宜引退去就之義庶乎不苟伏望護法矜其豖鹿之性早賜還山幸適餘年始終佩德臨穎無在惶悚待命之至與白雲子素上座老僧新歲忽得風疾其衰頽老態難以筆畫上座高踞白雲正是埋頭蓄養之時切念授受匪輕晷刻于法自警使來學有所嚮慕庶不負擔荷從上大事也開宗來特書數行慰汝安分住山慎勿以老僧為慮至囑至囑答嘉禾頂居士承敘述參見先輩及諸方尊宿無不親覲請益毒恨宿無靈骨未透向上關捩欲山野扶起鈍根使百年古鏡一旦復明銜結之恩不獨遙空頂禮已也讀至此好與三十棒棒棒與居士見血染紅秀水一溪流豈是分外雖然且作死馬醫向數問處一一略露鞭影會與不會是居士分上事山野終不敢再為分疏更添枷杻也此復問如何得成佛作祖去答會取煙雨樓問問道於盲意旨如何答偷心路絶問了得一萬事畢玄墓剖和尚如何發願西方答長安路上笑行人問一靈未假胞胎時在何處安身立命答切忌迷頭怖走問東家作驢西家作馬請一語答總是者一頭問要騎便騎要下便下意作麼生答元來卻是汝問如何是祖師西來意云庭前柏樹子與神前酒臺盤是同是別答不解指數勞動算盤問寒時寒殺闍黎熱時熱殺闍黎如何得無寒暑去答捏著鼻孔看問暫時不在如同死人不在箇甚麼答門前石敢當
