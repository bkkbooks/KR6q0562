front:
  text: 重刻靈機禪師語錄原稿序靈機禪師得法於金粟費老人為其白足後闢講堂於翔鳳為資福之開山祖所傳語錄舊有鋟本宗門推尚之久矣今其法嗣大展繼席資福以舊本之未盡厥傳也將重加訂正梓而行之請序於余余聞禪門之學空諸所有不立文字即其當機問對一言半偈要歸其旨於虛寂而已靈師實能洞徹斯旨故其生平言語不令其徒撰錄舊本所載亦其侍者得於睹記潛鈔而授之梓用以廣其師傳耳非靈師之意也今大展見謂未備又欲刻之何歟蓋釋氏之教雖與儒者歸趣不同至於審辨源流尊信師說俾天下後世因其言以知其人而其教澤亦藉以不墜其用心則一也韓子有言孟軻氏未嘗著書今其七篇乃萬章公孫丑之徒相與紀其言而傳之耳由是言之假令當時無尊信師說如諸子其人者則孟氏之書不傳百世而下安能使其名赤赤卓卓為群儒冠哉大展侍靈師最久得其宗旨獨深其所睹記比他人尤詳不欲令其師傳之稍有湮沒也則其於是役也能無亟亟乎余喜大展之尊信師說與吾儒同而靈師之教澤亦藉其人以益廣也故不辭而序之賜進士出身翰林院庶吉士華亭沈宗敬撰刻正靈機禪師語錄原稿序昔玉林和尚語諸弟子曰天下宗師靈機第一蓋師為海內所推服稱臨濟正宗一語一默一顰一笑皆甘露也師示寂後有弟子急於入都倉卒梓師語錄二卷攜之北行時入室弟子大展方養母他山未得預聞後繼席翔鳳見錄中改誤多端前後易置不勝驚惋謂先師語錄乃一代人天眼目安可淆訛失序欲悉依原稿刻正垂示百世俾吳騏為敘騏謂語錄與文章異文章之家研京十年練都一紀追琢求工故可改也語錄出自見地如火必熱如水必溼如金必堅如刀必利豈容商酌擬議哉不待商酌擬議而一切賓主炤用殺活與奪性靈手眼千品萬偈無所不備譬人始生五官百骸腑臟膏血八萬毛孔一時具足若有刪改文飾則是裝偶塑像非生人也人已生矣而欲脩削之雕琢之豈非事理之萬萬不可者哉昔歐陽公以舊唐書張濬傳中做面子三字不雅改為作態識者謂做面子三字意忌而含怒氣傲而詞強作態二字意謔而含笑氣柔而語弱情事全失不如舊書遠甚夫歐公之才且不能輕易改書而況不如歐公者也藥山聞雲巖一言曰吾於此得見海兄百世之後有讀語錄而見靈機真面目者大展之力也夫甲戌初冬九峰遺黎吳騏頓首拜撰序古有言行解相應名之曰祖今之據名剎踐祖位者說法如雲如雨謦欬如珠如玉察其所為則行不副解解不副行總被二風所觸傲然竊名於祖位可乎惟吾楊墳觀和尚幼陞天童之堂刳心礪志真參實悟直躋金粟堂奧倒捋逆批費老人素稱室中真子也厥後住山三十載足不踰閫故能不起于座化荊棘為寶坊無法當情辨龍蛇於叱吒其激揚宗旨萬指鏗鏘即飽參宿學之士一嬰其鋒靡不讋縮咋舌而退是以喻其刻苦蒞眾則如珠走雪床之楊岐也論其頌古渾樸則如敲金戛玉之白雲也觀其機用敏捷則如縱奪臨時捉敗同參之興化也至若開法四十年來法語機緣甚夥每呵今時別傳之旨泥於文字禁止謄錄既沒而無隻字示人則又跂乎雲門諸老之上矣茲所行於世者其門人久侍潛鈔密記輳集而成書蓋十存其一耳嗚呼和尚之行解卓然足以邁古超今滅卻正宗之嫡髓詎在多乎是為序前住龍池法弟大珍拜題靈機觀禪師語錄目錄卷首序文卷一陞座小參示眾卷二機緣垂問卷三勘辨早參晚參卷四落堂源流頌卷五頌古書問卷六雜偈真讚佛事卷尾行狀塔銘跋誌靈機觀禪師語錄目錄終
